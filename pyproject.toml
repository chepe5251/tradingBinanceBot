[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# E: pycodestyle errors, F: pyflakes, I: isort, W: warnings
select = ["E", "F", "I", "W"]
ignore = [
    "E501",   # line too long (handled by formatter)
    "F841",   # local variable assigned but never used (trade_state pattern)
]
