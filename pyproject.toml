[tool.pytest.ini_options]
# Add repo root to sys.path so tests import project modules without installation.
pythonpath = ["."]
testpaths = ["tests"]
markers = [
    "unit: pure-logic tests with no network or filesystem I/O",
    "integration: tests that wire multiple real components together",
]
addopts = "--tb=short"

[tool.coverage.run]
source = ["."]
omit = [
    "tests/*",
    ".venv/*",
    "backtest/*",
    "setup.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]
show_missing = true

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# E: pycodestyle errors, F: pyflakes, I: isort, W: warnings
select = ["E", "F", "I", "W"]
ignore = [
    "E501",   # line too long (handled by formatter)
    "F841",   # local variable assigned but never used (trade_state pattern)
]
