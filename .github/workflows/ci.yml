name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Run ruff
        run: ruff check .

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check (py_compile)
        run: |
          python - <<'PY'
          import pathlib
          import py_compile
          import sys

          skip = {".venv", "__pycache__", ".git"}
          errors = []
          for path in pathlib.Path(".").rglob("*.py"):
              if any(part in skip for part in path.parts):
                  continue
              try:
                  py_compile.compile(str(path), doraise=True)
              except py_compile.PyCompileError as exc:
                  errors.append(str(exc))
          if errors:
              print("\n".join(errors))
              sys.exit(1)
          print("py_compile OK")
          PY

      - name: Run unit tests
        run: python -m pytest tests/ -v -m unit

      - name: Run integration tests
        run: python -m pytest tests/ -v -m integration

      - name: Coverage report (core modules)
        run: |
          python -m pytest tests/ \
            --cov=risk --cov=strategy --cov=sizing \
            --cov=execution --cov=monitor_logic --cov=indicators \
            --cov-report=term-missing \
            -q

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t binance_bot_ci .
